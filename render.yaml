services:
  - type: web
    name: task-manager-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./task_manager.db
      - key: SECRET_KEY
        generateValue: true